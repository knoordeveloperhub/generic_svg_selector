name: generic_svg_selector
description: A Flutter plugin to interactively select parts of any flat SVG by tapping.
version: 0.6.0
homepage: https://github.com/knoordeveloperhub/generic_svg_selector
repository: https://github.com/knoordeveloperhub/generic_svg_selector
issue_tracker: https://github.com/knoordeveloperhub/generic_svg_selector/issues

topics:
  - svg
  - selector
  - interactive
  - body-parts

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  xml: ^7.0.1
  path_drawing: ^1.0.1
  touchable: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.generic_svg_selector
        pluginClass: GenericSvgSelectorPlugin
      ios:
        pluginClass: GenericSvgSelectorPlugin