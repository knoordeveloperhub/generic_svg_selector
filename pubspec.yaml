name: generic_svg_selector
description: A Flutter plugin to interactively select parts of any flat SVG by tapping. Supports dynamic ID extraction, mirror mode, and custom colors.
version: 0.2.0
homepage: https://github.com/YOUR_USERNAME/generic_svg_selector

topics:
  - svg
  - selector
  - interactive
  - body-parts

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  xml: ^6.3.0
  path_drawing: ^1.0.1
  touchable: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.generic_svg_selector
        pluginClass: GenericSvgSelectorPlugin
      ios:
        pluginClass: GenericSvgSelectorPlugin